snapshots:
  - name: dim_listings
    relation: ref('eph_listings')
    config:
      schema: gold
      database: DBT_DEV
      unique_key: listing_id
      strategy: timestamp
      updated_at: created_at
      dbt_valid_to_current: "to_date('9999-12-31')" # Specifies that current records should have `dbt_valid_to` set to `'9999-12-31'` instead of `NULL`.